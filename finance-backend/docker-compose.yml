version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      # Note: Typically FIREBASE_KEY_PATH or GOOGLE_APPLICATION_CREDENTIALS points to service account json
    depends_on:
      - redis
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge

volumes:
  redis_data:
